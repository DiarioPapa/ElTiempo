<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias para Papá</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: white;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 {
  font-size: 48px;
  margin-bottom: 40px;
}

button {
  font-size: 42px;
  padding: 30px;
  margin: 20px 0;
  width: 100%;
  border-radius: 20px;
  border: 3px solid black;
  background-color: white;
}

.detener {
  background-color: black;
  color: white;
}

.volver {
  font-size: 32px;
  margin-top: 40px;
}
</style>
</head>
<body>

<div id="inicio">
<h1>EL TIEMPO</h1>
<div id="botonesSecciones"></div>
</div>

<div id="seccion" style="display:none;">
<h1 id="tituloSeccion"></h1>
<div id="listaNoticias"></div>
<button class="volver" onclick="volverInicio()">⬅ VOLVER</button>
</div>

<div id="noticia" style="display:none;">
<h1 id="tituloNoticia"></h1>
<button class="detener" onclick="detenerLectura()">■ DETENER</button>
<button class="volver" onclick="volverSeccion()">⬅ VOLVER</button>
</div>

<script>

// =============================
// AQUÍ EDITAS LAS SECCIONES
// =============================

const noticias = {

  portada: [
    {
      titulo: "Ejemplo Portada",
      texto: "Aquí debes pegar el texto completo de la noticia."
    }
  ],

  politica: [
    {
      titulo: "Ejemplo Política",
      texto: "Aquí debes pegar el texto completo de la noticia."
    }
  ],

  opinion: [
    {
      titulo: "Ejemplo Opinión",
      texto: "Aquí debes pegar el texto completo de la columna."
    }
  ]

};

// =============================
// NO MODIFICAR DESDE AQUÍ
// =============================

let seccionActual = "";
let noticiaActual = null;
let vozSeleccionada = null;

function cargarSecciones() {
  const contenedor = document.getElementById("botonesSecciones");
  contenedor.innerHTML = "";

  Object.keys(noticias).forEach(seccion => {
    const btn = document.createElement("button");
    btn.innerText = seccion.toUpperCase();
    btn.onclick = function() {
      mostrarSeccion(seccion);
    };
    contenedor.appendChild(btn);
  });
}

function mostrarSeccion(seccion) {
  seccionActual = seccion;
  document.getElementById("inicio").style.display = "none";
  document.getElementById("seccion").style.display = "block";
  document.getElementById("tituloSeccion").innerText = seccion.toUpperCase();

  const lista = document.getElementById("listaNoticias");
  lista.innerHTML = "";

  noticias[seccion].forEach((n, index) => {
    const btn = document.createElement("button");
    btn.innerText = n.titulo;
    btn.onclick = function() {
      mostrarNoticia(index);
    };
    lista.appendChild(btn);
  });
}

function mostrarNoticia(index) {
  noticiaActual = noticias[seccionActual][index];

  document.getElementById("seccion").style.display = "none";
  document.getElementById("noticia").style.display = "block";
  document.getElementById("tituloNoticia").innerText = noticiaActual.titulo;

  leerNoticia(); // LECTURA AUTOMÁTICA
}

function seleccionarMejorVoz() {
  const voces = speechSynthesis.getVoices();

  // Preferir voz en español de Colombia o español mejor calidad
  vozSeleccionada =
    voces.find(v => v.lang === "es-CO") ||
    voces.find(v => v.lang.startsWith("es")) ||
    voces[0];
}

function leerNoticia() {
  speechSynthesis.cancel();

  const texto = new SpeechSynthesisUtterance(noticiaActual.texto);
  texto.rate = 0.9;
  texto.pitch = 1;
  texto.voice = vozSeleccionada;

  speechSynthesis.speak(texto);
}

function detenerLectura() {
  speechSynthesis.cancel();
}

function volverInicio() {
  speechSynthesis.cancel();
  document.getElementById("seccion").style.display = "none";
  document.getElementById("inicio").style.display = "block";
}

function volverSeccion() {
  speechSynthesis.cancel();
  document.getElementById("noticia").style.display = "none";
  document.getElementById("seccion").style.display = "block";
}

window.speechSynthesis.onvoiceschanged = function() {
  seleccionarMejorVoz();
};

cargarSecciones();

</script>

</body>
</html>
